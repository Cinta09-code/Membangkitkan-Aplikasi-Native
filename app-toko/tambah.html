<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tambah Barang</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="container">
    <h2>Tambah Barang Baru</h2>

    <div id="notifikasi" class="notifikasi tersembunyi"></div>

    <form id="formTambah">

      <div class="form-group">
        <label for="nama_barang">Nama Barang</label>
        <input
          type="text"
          id="nama_barang"
          placeholder="Contoh: Kopi Arabika"
          required
        />
      </div>

      <div class="form-group">
        <label for="harga">Harga (Rp)</label>
        <input
          type="number"
          id="harga"
          placeholder="Contoh: 25000"
          min="1"
          required
        />
      </div>

      <button type="submit" id="btnKirim">Simpan Barang</button>

    </form>

    <a href="index.html" class="link-kembali">← Kembali ke Daftar Barang</a>
  </div>

  <script src="app.js"></script>

</body>
</html>
