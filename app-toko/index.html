<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Toko PWA</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AppToko" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Plus Jakarta Sans', 'sans-serif'],
            mono: ['DM Mono', 'monospace'],
          }
        }
      }
    }
  </script>

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }

    /* Mode edit: highlight baris yang sedang diedit */
    tr.editing {
      background-color: #fefce8 !important;
      outline: 2px solid #fbbf24;
      outline-offset: -2px;
    }

    #notifikasi { display: none; }
    #notifikasi.sukses {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
    }
    #notifikasi.error {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen font-sans">

  <!-- ── HEADER ── -->
  <header class="bg-teal-600 px-8 h-16 flex items-center justify-between sticky top-0 z-50 shadow-sm">
    <div class="flex items-center gap-3 text-white">
      <div class="w-9 h-9 bg-white/20 rounded-xl flex items-center justify-center text-lg">🛒</div>
      <div>
        <div class="text-base font-bold tracking-tight">Aplikasi Toko</div>
        <div class="text-xs opacity-70 mt-px">Manajemen Barang</div>
      </div>
    </div>
    <span class="bg-white/20 text-white text-xs font-semibold px-3 py-1 rounded-full tracking-wider">PWA</span>
  </header>

  <!-- ── PAGE ── -->
  <div class="max-w-5xl mx-auto px-6 py-8 pb-16 grid grid-cols-1 lg:grid-cols-[1fr_360px] gap-6 items-start">

    <!-- Tabel Barang -->
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden">
      <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between">
        <span class="text-sm font-bold text-slate-900 tracking-tight">Daftar Barang</span>
        <span id="jumlah-barang" class="text-xs font-semibold bg-teal-100 text-teal-700 px-3 py-1 rounded-full">
          Memuat...
        </span>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full border-collapse">
          <thead>
            <tr>
              <th class="bg-teal-50 text-teal-700 text-[11px] font-bold uppercase tracking-widest px-4 py-3 text-left w-12">ID</th>
              <th class="bg-teal-50 text-teal-700 text-[11px] font-bold uppercase tracking-widest px-4 py-3 text-left">Nama Barang</th>
              <th class="bg-teal-50 text-teal-700 text-[11px] font-bold uppercase tracking-widest px-4 py-3 text-right">Harga</th>
              <th class="bg-teal-50 text-teal-700 text-[11px] font-bold uppercase tracking-widest px-4 py-3 text-center w-36">Aksi</th>
            </tr>
          </thead>
          <tbody id="tabel-barang"></tbody>
        </table>
      </div>
    </div>

    <!-- Form Tambah / Edit -->
    <div class="bg-white rounded-2xl border border-slate-200 overflow-hidden lg:sticky lg:top-20 transition-all duration-300" id="form-card">

      <!-- Header Form — berubah saat mode edit -->
      <div class="px-5 py-4 border-b border-slate-200 flex items-center justify-between" id="form-header">
        <div>
          <div class="text-sm font-bold text-slate-900" id="form-title">Tambah Barang</div>
          <div class="text-xs text-slate-500 mt-0.5" id="form-subtitle">Isi data lalu simpan ke database</div>
        </div>
        <!-- Tombol Batal Edit (tersembunyi saat mode tambah) -->
        <button
          id="btnBatal"
          onclick="batalEdit()"
          class="hidden text-xs font-semibold text-slate-500 hover:text-rose-500 bg-slate-100 hover:bg-rose-50
                 px-3 py-1.5 rounded-lg transition-all duration-150">
          ✕ Batal
        </button>
      </div>

      <form id="formTambah" class="p-5 flex flex-col gap-4">

        <!-- Input ID tersembunyi untuk mode edit -->
        <input type="hidden" id="edit_id" value="" />

        <div id="notifikasi"></div>

        <!-- Badge mode edit -->
        <div id="edit-badge" class="hidden items-center gap-2 bg-amber-50 border border-amber-200 text-amber-700
             text-xs font-semibold px-3 py-2 rounded-xl">
          <span class="text-base"></span>
          <span>Mode Edit — ID: <span id="edit-id-label" class="font-mono font-bold"></span></span>
        </div>

        <!-- Field Nama Barang -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
            Nama Barang
          </label>
          <input
            type="text"
            id="nama_barang"
            placeholder="contoh: Laptop Asus"
            required
            class="w-full px-3 py-2.5 border-2 border-slate-200 rounded-xl text-sm font-sans text-slate-900 bg-white
                   placeholder:text-slate-300 outline-none transition-all duration-200
                   focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
          />
        </div>

        <!-- Field Harga -->
        <div>
          <label class="block text-xs font-semibold text-slate-500 uppercase tracking-wider mb-1.5">
            Harga
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-sm font-semibold text-slate-400 pointer-events-none">
              Rp
            </span>
            <input
              type="number"
              id="harga"
              placeholder="25000"
              min="1"
              required
              class="w-full pl-9 pr-3 py-2.5 border-2 border-slate-200 rounded-xl text-sm font-sans text-slate-900 bg-white
                     placeholder:text-slate-300 outline-none transition-all duration-200
                     focus:border-teal-500 focus:ring-4 focus:ring-teal-500/10"
            />
          </div>
        </div>

        <!-- Tombol Submit — berubah saat mode edit -->
        <button
          type="submit"
          id="btnKirim"
          class="w-full py-3 font-bold text-sm text-white rounded-xl transition-all duration-200
                 active:scale-[.98] disabled:opacity-60 disabled:cursor-not-allowed
                 bg-amber-400 hover:bg-amber-500"
        >
          Simpan Barang
        </button>

      </form>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
