<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Aplikasi Toko PWA</title>

  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d9488" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="AppToko" />
  <link rel="apple-touch-icon" href="icons/icon-192x192.png" />

  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --teal:       #0d9488;
      --teal-dark:  #0f766e;
      --teal-light: #ccfbf1;
      --teal-soft:  #f0fdfa;
      --amber:      #f59e0b;
      --amber-dark: #d97706;
      --text-main:  #0f172a;
      --text-muted: #64748b;
      --border:     #e2e8f0;
      --white:      #ffffff;
      --bg:         #f8fafc;
      --success-bg: #dcfce7;
      --success-fg: #166534;
      --success-bd: #86efac;
      --error-bg:   #fee2e2;
      --error-fg:   #991b1b;
      --error-bd:   #fca5a5;
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      min-height: 100vh;
    }

    /* ── HEADER ── */
    .header {
      background: var(--teal);
      padding: 0 2rem;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 1px 0 rgba(0,0,0,.12);
    }
    .header-brand {
      display: flex;
      align-items: center;
      gap: 10px;
      color: white;
    }
    .header-icon {
      width: 36px; height: 36px;
      background: rgba(255,255,255,.15);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .header-title { font-size: 17px; font-weight: 700; letter-spacing: -.3px; }
    .header-sub   { font-size: 11px; opacity: .7; margin-top: 1px; }
    .header-badge {
      background: rgba(255,255,255,.18);
      color: white;
      font-size: 11px;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      letter-spacing: .4px;
    }

    /* ── LAYOUT ── */
    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
      display: grid;
      grid-template-columns: 1fr 360px;
      gap: 1.5rem;
      align-items: start;
    }
    @media (max-width: 768px) {
      .page { grid-template-columns: 1fr; }
    }

    /* ── CARD ── */
    .card {
      background: var(--white);
      border-radius: 16px;
      border: 1px solid var(--border);
      overflow: hidden;
    }
    .card-header {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: -.2px;
    }
    .card-count {
      font-size: 11px;
      font-weight: 600;
      background: var(--teal-light);
      color: var(--teal-dark);
      padding: 3px 9px;
      border-radius: 20px;
    }

    /* ── TABLE ── */
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: var(--teal-soft);
      color: var(--teal-dark);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      padding: 10px 16px;
      text-align: left;
    }
    thead th:last-child { text-align: right; }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background .15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--teal-soft); }
    tbody td {
      padding: 11px 16px;
      font-size: 13.5px;
      color: var(--text-main);
    }
    .td-id {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
      width: 48px;
    }
    .td-nama { font-weight: 500; }
    .td-harga {
      text-align: right;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      color: var(--teal-dark);
    }
    .empty-state {
      padding: 3rem 1rem;
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: .5rem; }

    /* ── FORM CARD ── */
    .form-card { position: sticky; top: 80px; }
    .form-header {
      padding: 1.1rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .form-header-title {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-main);
    }
    .form-header-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .form-body { padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      padding: 9px 12px;
      border: 1.5px solid var(--border);
      border-radius: 9px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text-main);
      background: var(--white);
      transition: border-color .2s, box-shadow .2s;
      outline: none;
    }
    .field input:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(13,148,136,.12);
    }
    .field input::placeholder { color: #cbd5e1; }

    .input-prefix {
      position: relative;
    }
    .input-prefix span {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 600;
      pointer-events: none;
    }
    .input-prefix input { padding-left: 36px; }

    /* ── NOTIFIKASI ── */
    #notifikasi {
      border-radius: 9px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      display: none;
    }
    #notifikasi.sukses {
      background: var(--success-bg);
      color: var(--success-fg);
      border: 1px solid var(--success-bd);
    }
    #notifikasi.error {
      background: var(--error-bg);
      color: var(--error-fg);
      border: 1px solid var(--error-bd);
    }

    /* ── BUTTON ── */
    #btnKirim {
      width: 100%;
      padding: 11px;
      background: var(--amber);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background .2s, transform .1s;
      letter-spacing: -.2px;
    }
    #btnKirim:hover   { background: var(--amber-dark); }
    #btnKirim:active  { transform: scale(.98); }
    #btnKirim:disabled {
      opacity: .6;
      cursor: not-allowed;
      transform: none;
    }

    /* ── LOADING SKELETON ── */
    .skeleton {
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 6px;
      height: 14px;
    }
    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-icon">🛒</div>
      <div>
        <div class="header-title">Aplikasi Toko</div>
        <div class="header-sub">Manajemen Barang</div>
      </div>
    </div>
    <div class="header-badge">PWA</div>
  </header>

  <!-- Page -->
  <div class="page">

    <!-- Tabel Barang -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Daftar Barang</span>
        <span class="card-count" id="jumlah-barang">Memuat...</span>
      </div>
      <div class="overflow-x-auto">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nama Barang</th>
              <th style="text-align:right">Harga</th>
            </tr>
          </thead>
          <tbody id="tabel-barang"></tbody>
        </table>
      </div>
    </div>

    <!-- Form Tambah -->
    <div class="card form-card">
      <div class="form-header">
        <div class="form-header-title">Tambah Barang</div>
        <div class="form-header-sub">Isi data lalu simpan ke database</div>
      </div>
      <form id="formTambah" class="form-body">

        <div id="notifikasi"></div>

        <div class="field">
          <label>Nama Barang</label>
          <input type="text" id="nama_barang" placeholder="contoh: Laptop Asus" required />
        </div>

        <div class="field">
          <label>Harga</label>
          <div class="input-prefix">
            <span>Rp</span>
            <input type="number" id="harga" placeholder="25000" min="1" required />
          </div>
        </div>

        <button type="submit" id="btnKirim">Simpan Barang</button>

      </form>
    </div>

  </div>

  <script src="app.js"></script>
</body>
</html>
