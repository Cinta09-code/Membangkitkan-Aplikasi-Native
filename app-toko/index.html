<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Aplikasi Toko PWA</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-emerald-100 to-white min-h-screen">

    <!-- Header -->
    <div class="bg-emerald-600 text-white p-5 shadow-lg">
        <h1 class="text-2xl font-bold text-center">🛒 Aplikasi Toko</h1>
        <p class="text-center text-sm opacity-80">Daftar Barang</p>
    </div>

    <!-- Container -->
    <div class="max-w-5xl mx-auto mt-8 px-4">

        <!-- Card -->
        <div class="bg-white rounded-2xl shadow-lg overflow-hidden">

            <!-- Title -->
            <div class="p-4 border-b flex justify-between items-center">
                <h2 class="font-semibold text-lg">Data Barang</h2>
                <button class="bg-emerald-500 text-white px-4 py-2 rounded-lg hover:bg-emerald-600 transition">
                    + Tambah
                </button>
            </div>

            <!-- Table -->
            <div class="overflow-x-auto">
                <table class="w-full text-sm text-left">
                    
                    <thead class="bg-emerald-500 text-white">
                        <tr>
                            <th class="p-3">ID</th>
                            <th class="p-3">Nama Barang</th>
                            <th class="p-3">Harga</th>
                        </tr>
                    </thead>

                    <tbody id="tabel-barang" class="text-gray-700">
                        <!-- Data dari JS -->
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</body>
<script src="app.js"></script>
</html>
